name: CI/CD pre-live (Hetzner)

# Builds ON the Hetzner box via a self-hosted runner (GitHub-hosted runners are
# over quota; self-hosted minutes are free).
#   - pull_request -> `build` job validates the image compiles (visible merge signal)
#   - push to master / manual -> `deploy` job builds + redeploys on the box,
#     and auto-rolls-back to the last-good image if the health check fails.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cicd-backend-prelive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Merge signal: only builds the image, never touches the running stack.
  build:
    name: build
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, dvla-prelive]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image (validation only — no deploy)
        run: docker build -t dvla-backend-ci:${{ github.sha }} .

      - name: Clean up CI image
        if: always()
        run: |
          docker rmi dvla-backend-ci:${{ github.sha }} 2>/dev/null || true
          docker image prune -f

  deploy:
    name: deploy
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, dvla-prelive]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync source into deploy dir
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'uploads/' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ /opt/dvla/backend/

      - name: Sync compose file (Caddyfile is left untouched — it holds the basic-auth hash)
        run: cp ./deploy/docker-compose.yml /opt/dvla/docker-compose.yml

      - name: Capture current image (for rollback)
        id: prev
        working-directory: /opt/dvla
        run: |
          CID=$(docker compose ps -q backend 2>/dev/null || true)
          if [ -n "$CID" ]; then
            echo "sha=$(docker inspect --format '{{.Image}}' "$CID")" >> "$GITHUB_OUTPUT"
            echo "ref=$(docker inspect --format '{{.Config.Image}}' "$CID")" >> "$GITHUB_OUTPUT"
            echo "captured last-good image for rollback"
          else
            echo "no running backend container yet (first deploy)"
          fi

      - name: Build & deploy backend (migrations auto-apply via entrypoint)
        working-directory: /opt/dvla
        run: docker compose up -d --build backend

      - name: Health check (auto-rollback on failure)
        working-directory: /opt/dvla
        run: |
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 https://api.dvla.3dt.com.gh/health >/dev/null 2>&1; then
              echo "✅ backend healthy"; exit 0
            fi
            echo "waiting for backend... ($i)"; sleep 3
          done
          echo "❌ health check failed — rolling back to last-good image"
          docker compose logs backend --tail=60 || true
          SHA="${{ steps.prev.outputs.sha }}"; REF="${{ steps.prev.outputs.ref }}"
          if [ -n "$SHA" ] && [ -n "$REF" ]; then
            docker tag "$SHA" "$REF"
            docker compose up -d --no-build backend
            echo "↩️ rolled back to previous image ($SHA); pre-live stays on last-good version"
          else
            echo "no previous image captured — cannot roll back automatically"
          fi
          exit 1

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
